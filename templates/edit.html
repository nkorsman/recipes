<!doctype html>
<html>
    <head>
        <title>Recipes</title>
    </head>

    <body>
        <h1>Recipes</h1>
        <p>
            <a href="/">Home</a> | {%if session.username %}
            <a href="/create-recipe">New recipe</a> | You are logged in as {{
            session.username }} |
            <a href="/logout">Log out</a>
            {% else %}
            <a href="/login">Log in</a> |
            <a href="/register">Register</a>
            {% endif %}
        </p>
        <hr />
        <h2>{{ recipe.title }}</h2>
        <form method="post">
            <input type="text" name="title" placeholder="New recipe title" />
            <input type="submit" value="Rename" />
        </form>

        <h3>Ingredients</h3>
        <ul>
            {% for ingredient in ingredients %}
            <li>{{ ingredient.content }}</li>
            {% endfor %}
            <li>
                <form action="/create-ingredient" method="post">
                    <input
                        type="hidden"
                        name="recipe_id"
                        value="{{ recipe.id }}"
                    />
                    <input
                        type="text"
                        name="content"
                        placeholder="New ingredient"
                    />
                    <input type="submit" value="Add ingredient" />
                </form>
            </li>
        </ul>

        <h3>Instructions</h3>

        <form action="/recipe/{{ recipe.id }}">
            <input type="submit" value="Finish editing" />
        </form>
    </body>
</html>
