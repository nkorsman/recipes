{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
    <h2>Register</h2>
    <form method="post">
        <p>
            <label for="username">Username</label><br />
            <input
                type="text"
                id="username"
                name="username"
                maxlength="20"
                required
                value="{{ filled_username }}"
            />
        </p>
        <p>
            <label for="password1">Password</label><br />
            <input
                type="password"
                id="password1"
                name="password1"
                maxlength="100"
                required
            />
        </p>
        <p>
            <label for="password2">Password again</label><br />
            <input
                type="password"
                id="password2"
                name="password2"
                maxlength="100"
                required
            />
        </p>
        <button type="submit">Create account</button>
    </form>
{% endblock %}
