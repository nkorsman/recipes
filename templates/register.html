{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
    <h2>Register</h2>
    <form method="post">
        <p>
            Username: <br />
            <input type="text" name="username" maxlength="20" required />
        </p>
        <p>
            Password: <br />
            <input type="password" name="password1" maxlength="100" required />
        </p>
        <p>
            Password again: <br />
            <input type="password" name="password2" maxlength="100" required />
        </p>
        <input type="submit" value="Create account" />
    </form>
{% endblock %}
