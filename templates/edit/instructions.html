{% extends "edit/edit.html" %}

{% block title %}
    Edit instructions
{% endblock title %}

{% block instructions %}
    <form method="post">
        <input
            type="hidden"
            name="csrf_token"
            value="{{ session.csrf_token }}"
        />
        {% for item in items %}
            <textarea
                name="item"
                rows="4"
                cols="60"
                placeholder="Recipe step"
                maxlength="1000"
            >
{{ item }}</textarea
            >
            <button
                type="submit"
                name="action"
                value="remove:{{ loop.index0 }}"
            >
                -
            </button>
            {% if not loop.last %}<br />{% endif %}
        {% endfor %}
        <button type="submit" name="action" value="new">+</button>
        <br />
        <button type="submit" name="action" value="save">Save</button>
        <button type="submit" name="action" value="cancel">Cancel</button>
    </form>
{% endblock instructions %}
