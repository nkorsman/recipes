{% extends "edit/edit.html" %}

{% block title %}
    Edit ingredients
{% endblock title %}

{% block ingredients %}
    <form method="post">
        <input
            type="hidden"
            name="csrf_token"
            value="{{ session.csrf_token }}"
        />
        <!-- We need a hidden submit button here since pressing enter submits the form using the form's first submit button.   -->
        <button type="submit" name="action" value="save" hidden>Save</button>
        {% for item in items %}
            <label for="ingredient-{{ loop.index }}"
                >Ingredient {{ loop.index }}</label
            >
            <input
                type="text"
                id="ingredient-{{ loop.index }}"
                name="item"
                value="{{ item }}"
                maxlength="100"
            />
            <button
                type="submit"
                name="action"
                value="remove:{{ loop.index0 }}"
                aria-label="Remove ingredient {{ loop.index }}"
            >
                -
            </button>
            {% if not loop.last %}<br />{% endif %}
        {% endfor %}
        <button
            type="submit"
            name="action"
            value="new"
            aria-label="Add new ingredient"
        >
            +
        </button>
        <br />
        <button type="submit" name="action" value="save">Save</button>
        <button type="submit" name="action" value="cancel">Cancel</button>
    </form>
{% endblock ingredients %}
