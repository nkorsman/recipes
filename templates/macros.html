{% macro recipe_list(recipes) %}
    {% if recipes %}
        <ul>
            {% for recipe in recipes %}
                <li>
                    <a href="/recipe/{{ recipe.id }}">{{ recipe.title }}</a> by
                    {{ recipe.username }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No recipes found.</p>
    {% endif %}
{% endmacro %}
