{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
    <h2>Login</h2>
    <form action="/login" method="post">
        <p>
            Username: <br />
            <input
                type="text"
                name="username"
                maxlength="40"
                required
                value="{{ filled_username }}"
            />
        </p>
        <p>
            Password: <br />
            <input type="password" name="password" maxlength="100" required />
        </p>
        <button type="submit">Log in</button>
    </form>
{% endblock %}
