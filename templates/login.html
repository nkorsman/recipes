<!doctype html>
<html>
    <head>
        <title>Recipes</title>
    </head>

    <body>
        <h1>Recipes</h1>
        <p>
            <a href="/">Home</a> | {%if session.username %}
            <a href="/create-recipe">New recipe</a> | You are logged in as {{
            session.username }} |
            <a href="/logout">Log out</a>
            {% else %}
            <a href="/login">Log in</a> |
            <a href="/register">Register</a>
            {% endif %}
        </p>
        <hr />
        <h2>Login</h2>
        <form action="/login" method="post">
            <p>
                Username: <br />
                <input type="text" name="username" />
            </p>
            <p>
                Password: <br />
                <input type="password" name="password" />
            </p>
            <input type="submit" value="Log in" />
        </form>
    </body>
</html>
