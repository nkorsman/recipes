{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
    <form action="/login" method="post">
        <p>
            Username: <br />
            <input type="text" name="username" maxlength="40" required />
        </p>
        <p>
            Password: <br />
            <input type="password" name="password" maxlength="100" required />
        </p>
        <input type="submit" value="Log in" />
    </form>
{% endblock %}
