{% extends "layout.html" %}
{% block title %}Login{% endblock %}
{% block content %}
    <h2>Login</h2>
    <form action="/login" method="post">
        <p>
            <label for="username">Username</label><br />
            <input
                type="text"
                id="username"
                name="username"
                maxlength="40"
                required
                value="{{ filled_username }}"
            />
        </p>
        <p>
            <label for="password">Password</label><br />
            <input
                type="password"
                id="password"
                name="password"
                maxlength="100"
                required
            />
        </p>
        <button type="submit">Log in</button>
    </form>
{% endblock %}
